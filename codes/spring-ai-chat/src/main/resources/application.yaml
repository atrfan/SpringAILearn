spring:
  application:
    name: spring-ai-chat
  ai:
    openai:
      api-key: ${DEEPSEEK_KEY}
      base-url: https://api.deepseek.com
      chat:
        model: deepseek-v4-pro
        temperature: 0.0
#    这里配置阿里云百炼的
#    openai:
