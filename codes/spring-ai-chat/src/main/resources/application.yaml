#      chat:
#        model: deepseek-v4-pro
#        temperature: 0.8 # 模型温度，值越大，输出结果越随机，范围在0-1之间
#      api-key: sk-xxxx
logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
    com.foxmimi.springaidemo: DEBUG
server:
  port: 8080